name: E2E Tests

# Solo corre si los secrets están configurados (repositorio personal: opcional).
# Para activar: Settings → Secrets and variables → Actions, agregar:
#   - E2E_SUPABASE_URL
#   - E2E_SUPABASE_ANON_KEY
#   - E2E_SERVICE_ROLE_KEY

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:  # permite correr manualmente desde la UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (worker + admin)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ secrets.E2E_SUPABASE_ANON_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write .env.local
        run: |
          cat > tests/e2e/.env.local << EOF
          SUPABASE_URL=${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.E2E_SUPABASE_ANON_KEY }}
          E2E_SUPABASE_URL=${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_ANON_KEY=${{ secrets.E2E_SUPABASE_ANON_KEY }}
          E2E_SERVICE_ROLE_KEY=${{ secrets.E2E_SERVICE_ROLE_KEY }}
          E2E_API_URL=http://localhost:3000/api
          E2E_WORKER_URL=http://localhost:5174
          E2E_ADMIN_URL=http://localhost:5173
          EOF

      - name: Start backend
        run: pnpm dev:api &
        env:
          PORT: 3000

      - name: Wait for backend
        run: npx wait-on http://localhost:3000/api/auth/me -t 30000 || true

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7