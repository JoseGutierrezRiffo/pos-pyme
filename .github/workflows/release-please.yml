name: Release Please

# Lee release-please-config.json del root. Crea PRs automáticos que
# bumpean version + actualizan CHANGELOG basado en conventional commits.
# Al mergear el PR, se crea el tag, que dispara release.yml.
#
# Conventional commits:
#   feat:        → minor bump (0.1.0 → 0.2.0)
#   fix:         → patch bump (0.1.0 → 0.1.1)
#   feat!:       → major bump (0.x.0 → 1.0.0) [breaking change]
#   chore:, docs:, test:, refactor:, ci: → no bump

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Config leída desde release-please-config.json en la raíz del repo
