name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancela runs anteriores en la misma PR para no wastear minutos.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test (unit + coverage)
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/business-rules/coverage/
          retention-days: 14

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Solo en push a main (no en PRs) para evitar ruido por transitive deps
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (prod only)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

      - name: Hardcoded secrets scan
        run: |
          if grep -rE 'eyJhbGciOi[A-Za-z0-9._-]{50,}|sk_(live|test)_[A-Za-z0-9]{20,}|password.*=.*["'"'"'][a-zA-Z0-9]{8,}' apps/ packages/ 2>/dev/null; then
            echo "❌ Possible hardcoded secret found. Review the lines above."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [quality-gates, security-audit]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.quality-gates.result }}" != "success" ] || [ "${{ needs.security-audit.result }}" != "success" ]; then
            echo "❌ Algún job falló"
            exit 1
          fi
          echo "✅ Todos los jobs pasaron"