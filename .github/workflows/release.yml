name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 8.10.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test

      - name: Package artifacts
        run: |
          mkdir -p release-artifacts
          cp -r apps/api/dist release-artifacts/api 2>/dev/null || true
          cp -r apps/web-admin/dist release-artifacts/web-admin
          cp -r apps/web-worker/dist release-artifacts/web-worker
          cp supabase/migrations/*.sql release-artifacts/ 2>/dev/null || true
          cp package.json release-artifacts/
          cp pnpm-lock.yaml release-artifacts/
          VERSION="${GITHUB_REF#refs/tags/}"
          tar -czf release-${VERSION}.tar.gz -C release-artifacts .
          echo "Created release-${VERSION}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-${{ github.ref_name }}.tar.gz
